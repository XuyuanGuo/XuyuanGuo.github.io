# about_title: About Me
about_profile_image: images/Profile.JPG
about_content: | # this will include new lines to allow paragraphs
  Hi, my name's XuyuanGuo and I'm an undergraduate student major in Computer Science and Technology, Beijing University of Posts and Telecommunications. 
  
  My research interest includes computer vision, computer graphics, machine learning, and computational photography.

content:
  - title: Projects # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: top-middle
        title: Super awesome project
        link: github.com/sproogen
        # link_text: Project Website
        additional_links:
          - title:  sproogen/modern-resume-theme
            icon: fab fa-github
            url: github.com/sproogen/modern-resume-theme
          # - title:  Github page for project (eg. sproogen/modern-resume-theme)
          #   icon: fab fa-github
          #   url: Link to project (eg. sproogen.github.io/modern-resume-theme)
        quote: >
          This is probably one of the greatest apps ever created, if you don't agree you're probably wrong.
        description: | # this will include new lines to allow paragraphs
          I started this project as a way if learning <mark>React</mark> and it has since grown into a fully fledged app. I have learned many skills through this and been I'm very proud of having this in my portfolio. If you don't have a project as awesome as this I would advise you make one.

  - title: Education # Title for the section
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Beijing University of Posts and Telecommunications
        caption: 2021 - 2025
        sub_title: B.Eng. Computer Science and Technology
        quote: >
          Beijing University of Posts and Telecommunications is a public university in Beijing, China. It is part of Project 211 and the Double First-Class Construction.
        description: | # this will include new lines to allow paragraphs
          During my time at BUPT I learnt most of my key skills that have I have taken through my career such as teamwork and working to tight deadlines. I thouroughly enjoyed my time as university and learnt a lot about a healthy work life balance.

          I also served as the class monitor for the "Experimental Class" of the Computer Science Department, Class of 2021. This experience significantly enhanced my organizational and interpersonal skills.

  - title: A Little More About Me
    layout: text
    content: | # this will include new lines to allow paragraphs
      Alongside my interests in computer science some of my other interests and hobbies are:
      - Photography
      - Exploring culinary delights
      - Playing a wide range of video games

